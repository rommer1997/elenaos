[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[[environmentVariables]]
name = "NODE_ENV"
value = "production"

[[environmentVariables]]
name = "PORT"
value = "3000"
